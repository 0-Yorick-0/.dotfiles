format = """
[ оЬС ](bg:#E6E6E6 fg:#090c0c)\
[оВі](bg:#973D19 fg:#E6E6E6)\
$directory\
[оВі](fg:#973D19 bg:#394260)\
$git_branch\
$git_status\
[оВі](fg:#2b676b bg:#212736)\
$nodejs\
$rust\
$golang\
$php\
$helm\
[оВі](fg:#212736 bg:#1d2230)\
[оВі](fg:#212736 bg:#1d2230)\
[оВі ](fg:#1d2230)\
\n$character"""

command_timeout=1000

[directory]
style = "fg:#e3e5e5 bg:#973D19"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
symbol = "пРШ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#973D19 bg:#2b676b)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#973D19 bg:#2b676b)]($style)'

[nodejs]
symbol = "оЬШ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#973D19 bg:#212736)]($style)'

[rust]
symbol = "оЮ®"
